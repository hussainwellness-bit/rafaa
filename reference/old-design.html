<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Training Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080808; --card: #111; --border: #1e1e1e; --border2: #2a2a2a;
  --accent: #c8ff00; --accent-dim: rgba(200,255,0,0.08); --accent-dim2: rgba(200,255,0,0.15);
  --red: #ff3d3d; --blue: #3d9fff; --blue-dim: rgba(61,159,255,0.1);
  --text: #f2f2f2; --text2: #aaa; --text3: #555;
  --lift: #181818; --lift2: #1e1e1e;
}
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100dvh; overflow-x: hidden; }

/* AUTH */
#authScreen { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 20px; }
.auth-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 5px; text-align: center; line-height: 1; margin-bottom: 6px; }
.auth-logo em { font-style: normal; color: var(--accent); }
.auth-sub { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; text-align: center; margin-bottom: 36px; }
.auth-box { width: 100%; max-width: 380px; background: var(--card); border: 1px solid var(--border2); border-radius: 20px; padding: 28px 24px; }
.auth-tabs { display: flex; gap: 4px; background: var(--lift); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 9px; border: none; border-radius: 8px; background: transparent; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.auth-tab.active { background: var(--accent); color: #000; font-weight: 700; }
.auth-field { margin-bottom: 14px; }
.auth-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; display: block; margin-bottom: 6px; }
.auth-input { width: 100%; background: var(--lift2); border: 1px solid var(--border2); border-radius: 12px; padding: 13px 16px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.auth-input:focus { border-color: var(--accent); }
.auth-btn { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; cursor: pointer; margin-top: 6px; transition: opacity 0.2s; }
.auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-error { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--red); text-align: center; margin-top: 12px; min-height: 16px; }

/* APP */
#appScreen { display: none; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 0; max-width: 700px; margin: 0 auto; }
.app-logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; line-height: 1; }
.app-logo em { font-style: normal; color: var(--accent); }
.app-header-right { display: flex; align-items: center; gap: 10px; }
.user-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 1px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.logout-btn { background: var(--lift2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 6px 12px; cursor: pointer; }

.nav { display: flex; gap: 5px; margin: 14px 16px 0; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 5px; max-width: 700px; margin-left: auto; margin-right: auto; }
.nav-btn { flex: 1; padding: 10px 8px; border: none; border-radius: 10px; background: transparent; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.nav-btn.active { background: var(--accent); color: #000; font-weight: 700; }

.wrap { max-width: 700px; margin: 0 auto; padding: 16px 16px 100px; }

.day-selector { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
.day-selector::-webkit-scrollbar { display: none; }
.day-btn { flex-shrink: 0; padding: 9px 14px; border: 1px solid var(--border2); border-radius: 100px; background: var(--card); color: var(--text3); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; position: relative; }
.day-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim2); }
.day-btn.is-today::after { content: ''; position: absolute; top: -2px; right: -2px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }

.session-header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; padding: 16px 18px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; }
.session-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; }
.session-focus { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 2px; margin-top: 2px; }
.save-btn { display: flex; align-items: center; gap: 7px; padding: 11px 20px; background: var(--accent); color: #000; border: none; border-radius: 100px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* EXERCISE CARD */
.ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
.ex-card.logged { border-color: rgba(200,255,0,0.22); }
.ex-card-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; gap: 10px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
.ex-title { font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 7px; }
.ex-done-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; display: none; }
.ex-card.logged .ex-done-dot { display: block; }
.ex-muscles-row { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.mt { font-family: 'DM Mono', monospace; font-size: 8px; padding: 2px 5px; border-radius: 4px; text-transform: uppercase; }
.m-chest     { background: rgba(255,100,100,0.12); color: #ff8c8c; }
.m-shoulder  { background: rgba(255,180,60,0.12);  color: #ffb84d; }
.m-tricep    { background: rgba(255,140,61,0.12);  color: #ff9a5c; }
.m-back      { background: rgba(61,159,255,0.12);  color: #6ab8ff; }
.m-bicep     { background: rgba(140,80,255,0.14);  color: #b07aff; }
.m-quad      { background: rgba(60,220,140,0.12);  color: #50d49a; }
.m-hamstring { background: rgba(255,200,60,0.12);  color: #ffd060; }
.m-glute     { background: rgba(255,100,200,0.12); color: #ff80d4; }
.m-calf      { background: rgba(60,200,200,0.12);  color: #50d4d4; }
.m-core      { background: rgba(200,255,0,0.1);    color: var(--accent); }
.m-trap      { background: rgba(160,100,255,0.12); color: #c080ff; }
.m-forearm   { background: rgba(200,150,100,0.12); color: #d4a474; }
.m-adductor  { background: rgba(200,100,150,0.12); color: #e07090; }
.m-lower     { background: rgba(255,160,60,0.1);   color: #ffaa50; }
.ex-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.ex-sets-badge { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); letter-spacing: 1px; }
.ex-kind-label { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); text-transform: uppercase; }
.chevron { color: var(--text3); font-size: 11px; transition: transform 0.2s; }
.ex-card.open .chevron { transform: rotate(180deg); }

.last-ref { padding: 7px 16px 8px; background: rgba(200,255,0,0.03); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.last-ref-label { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; flex-shrink: 0; }
.lset { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: var(--accent-dim); padding: 2px 7px; border-radius: 5px; }

.log-body { padding: 12px 16px 16px; display: none; }
.ex-card.open .log-body { display: block; }
.set-labels { display: grid; grid-template-columns: 28px 1fr 1fr 44px; gap: 6px; margin-bottom: 5px; }
.input-label { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; text-align: center; }
.sets-grid { display: flex; flex-direction: column; gap: 8px; }
.set-row { display: grid; grid-template-columns: 28px 1fr 1fr 44px; align-items: center; gap: 6px; }
.set-num { font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: var(--text3); text-align: center; }
.set-input { background: var(--lift2); border: 1px solid var(--border2); border-radius: 10px; padding: 12px 10px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 15px; outline: none; width: 100%; text-align: center; transition: border-color 0.2s; -webkit-appearance: none; }
.set-input:focus { border-color: var(--accent); }
.set-input::placeholder { color: var(--text3); font-size: 12px; }
.set-input.filled { border-color: rgba(200,255,0,0.25); color: var(--accent); background: rgba(200,255,0,0.04); }
.set-check { width: 44px; height: 44px; border: 2px solid var(--border2); border-radius: 12px; background: var(--lift2); color: var(--text3); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s, color 0.15s; flex-shrink: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.set-check.done { background: var(--accent) !important; border-color: var(--accent) !important; color: #000 !important; font-weight: 900; }
.notes-row { margin-top: 10px; }
.notes-input { width: 100%; background: var(--lift2); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 12px; color: var(--text2); font-family: 'DM Mono', monospace; font-size: 11px; outline: none; resize: none; transition: border-color 0.2s; }
.notes-input:focus { border-color: rgba(200,255,0,0.25); }
.notes-input::placeholder { color: var(--text3); }

/* ── DAILY CHECKLIST ── */
.daily-checklist {
  margin-top: 16px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}

.checklist-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.checklist-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text3);
}

.checklist-body { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 12px; }

/* STEPS ROW */
.check-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 16px;
  background: var(--lift);
  border-radius: 12px;
  border: 2px solid var(--border2);
  transition: border-color 0.2s;
}

.check-row.checked { border-color: rgba(200,255,0,0.3); background: rgba(200,255,0,0.03); }

.check-row-left { display: flex; flex-direction: column; gap: 2px; }

.check-row-icon-label { display: flex; align-items: center; gap: 8px; }

.check-row-icon { font-size: 18px; }

.check-row-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}

.check-row-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--text3);
  letter-spacing: 1px;
  margin-top: 2px;
  margin-left: 26px;
}

.check-row-sub.done-sub { color: var(--accent); }

.big-check {
  width: 48px;
  height: 48px;
  border: 2px solid var(--border2);
  border-radius: 14px;
  background: var(--lift2);
  color: var(--text3);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: all 0.15s;
}

.big-check.done { background: var(--accent) !important; border-color: var(--accent) !important; color: #000 !important; font-weight: 900; }

/* CARDIO ROW */
.cardio-block {
  background: var(--lift);
  border: 2px solid var(--border2);
  border-radius: 12px;
  padding: 13px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.2s;
}

.cardio-block.checked { border-color: rgba(61,159,255,0.35); background: rgba(61,159,255,0.04); }

.cardio-top { display: flex; align-items: center; justify-content: space-between; }

.cardio-label-row { display: flex; align-items: center; gap: 8px; }
.cardio-icon { font-size: 18px; }
.cardio-label { font-size: 13px; font-weight: 700; color: var(--text); }

.cardio-type-row { display: flex; gap: 6px; }

.cardio-type-btn {
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid var(--border2);
  background: var(--lift2);
  color: var(--text3);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.cardio-type-btn.selected { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); font-weight: 700; }

.cardio-duration-row { display: flex; align-items: center; gap: 8px; }

.duration-input {
  flex: 1;
  background: var(--lift2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}

.duration-input:focus { border-color: var(--blue); }
.duration-input::placeholder { color: var(--text3); font-size: 11px; }
.duration-input.filled { border-color: rgba(61,159,255,0.3); color: var(--blue); background: rgba(61,159,255,0.04); }

/* REST / CARDIO DAY */
.rest-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px 20px 20px; }
.rest-card-icon { font-size: 32px; margin-bottom: 8px; text-align: center; }
.rest-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--text2); text-align: center; margin-bottom: 16px; }

/* HISTORY */
.history-empty { text-align: center; padding: 60px 20px; color: var(--text3); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; }
.history-session { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
.history-session-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; gap: 10px; -webkit-tap-highlight-color: transparent; }
.hist-day-name { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 2px; }
.hist-date { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); margin-top: 2px; letter-spacing: 1px; }
.hist-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.hist-badge { font-family: 'DM Mono', monospace; font-size: 9px; padding: 3px 8px; border-radius: 5px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,255,0,0.12); }
.hist-badge.blue { background: var(--blue-dim); color: var(--blue); border-color: rgba(61,159,255,0.15); }
.hist-delete { background: none; border: 1px solid var(--border2); border-radius: 7px; color: var(--text3); padding: 6px 10px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
.history-session-body { display: none; padding: 0 16px 16px; }
.history-session.open .history-session-body { display: block; }
.history-session.open .hchevron { transform: rotate(180deg); }
.hchevron { color: var(--text3); font-size: 11px; transition: transform 0.2s; flex-shrink: 0; }
.hist-ex { margin-top: 12px; }
.hist-ex-name { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.hist-sets { display: flex; flex-wrap: wrap; gap: 5px; }
.hist-set { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--lift2); border: 1px solid var(--border2); border-radius: 7px; padding: 5px 10px; color: var(--text2); }
.hist-set.done { border-color: rgba(200,255,0,0.2); color: var(--accent); background: var(--accent-dim); }
.hist-notes { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 6px; font-style: italic; }
.hist-daily { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
.hist-daily-item { font-family: 'DM Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 6px; }
.hist-daily-item.done { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,255,0,0.15); }
.hist-daily-item.blue-done { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(61,159,255,0.15); }
.hist-daily-item.not-done { background: var(--lift2); color: var(--text3); border: 1px solid var(--border2); }

.loading { display: flex; align-items: center; justify-content: center; min-height: 100dvh; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--text3); }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--accent); color: #000; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; font-weight: 700; padding: 12px 24px; border-radius: 100px; opacity: 0; transition: all 0.3s cubic-bezier(.2,.8,.3,1); z-index: 9999; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); color: #fff; }
</style>
</head>
<body>

<div class="loading" id="loadingScreen">LOADING...</div>

<div id="authScreen" style="display:none">
  <div class="auth-logo">TRAINING<br><em>TRACKER</em></div>
  <div class="auth-sub">// Cutting Phase · Full Body Split</div>
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
    </div>
    <div id="loginForm">
      <div class="auth-field"><label class="auth-label">Email</label><input class="auth-input" type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"></div>
      <div class="auth-field"><label class="auth-label">Password</label><input class="auth-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="auth-btn" onclick="handleLogin()">Login</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="auth-field"><label class="auth-label">Email</label><input class="auth-input" type="email" id="regEmail" placeholder="your@email.com" autocomplete="email"></div>
      <div class="auth-field"><label class="auth-label">Password</label><input class="auth-input" type="password" id="regPassword" placeholder="Min 6 characters" autocomplete="new-password"></div>
      <button class="auth-btn" onclick="handleRegister()">Create Account</button>
    </div>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div id="appScreen" style="display:none">
  <div class="app-header">
    <div class="app-logo">TRAINING <em>TRACKER</em></div>
    <div class="app-header-right">
      <span class="user-label" id="userLabel"></span>
      <button class="logout-btn" onclick="handleLogout()">Logout</button>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" id="navLog" onclick="switchView('log')">Log Session</button>
    <button class="nav-btn" id="navHistory" onclick="switchView('history')">History</button>
  </div>
  <div class="wrap">
    <div id="viewLog">
      <div class="day-selector" id="daySelector"></div>
      <div id="sessionArea"></div>
    </div>
    <div id="viewHistory" style="display:none">
      <div id="historyArea"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://qyvrtofcyezbjzcmobtx.supabase.co';
const SUPA_KEY = 'sb_publishable_8Q_wvatgkLpYgjGHK7bJZw_4VwB-qXr';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// ── WORKOUT DATA — Sunday has Fly BEFORE Press ──
const DAYS = [
  {
    name:"Sunday", short:"SUN", focus:"Chest · Legs · Shoulders",
    exercises:[

function safeId(name) { return name.replace(/[^a-zA-Z0-9]/g, '_'); }

let currentUser = null;
let currentDay = new Date().getDay();
let sessionData = {};
let dailyData = {}; // { steps: bool, cardio: { type, duration, done } }

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  hide('loadingScreen');
  if (session) { currentUser = session.user; showApp(); }
  else { show('authScreen'); }
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) { currentUser = session.user; hide('authScreen'); showApp(); }
  else if (event === 'SIGNED_OUT') { currentUser = null; hide('appScreen'); show('authScreen'); }
});

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  setAuthError('');
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email||!password) return setAuthError('Please fill in all fields');
  const btn = document.querySelector('#loginForm .auth-btn');
  btn.disabled=true; btn.textContent='Logging in...';
  const {error} = await sb.auth.signInWithPassword({email,password});
  btn.disabled=false; btn.textContent='Login';
  if (error) setAuthError(error.message);
}

async function handleRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!email||!password) return setAuthError('Please fill in all fields');
  if (password.length<6) return setAuthError('Password must be at least 6 characters');
  const btn = document.querySelector('#registerForm .auth-btn');
  btn.disabled=true; btn.textContent='Creating...';
  const {error} = await sb.auth.signUp({email,password});
  btn.disabled=false; btn.textContent='Create Account';
  if (error) setAuthError(error.message);
  else setAuthError('✓ Account created! Check your email to confirm, then login.');
}

async function handleLogout() { await sb.auth.signOut(); }
function setAuthError(msg) { document.getElementById('authError').textContent = msg; }

function showApp() {
  show('appScreen');
  document.getElementById('userLabel').textContent = (currentUser.email||'').split('@')[0];
  renderDaySelector();
  loadAndRenderSession();
}

function switchView(view) {
  document.getElementById('viewLog').style.display = view==='log'?'block':'none';
  document.getElementById('viewHistory').style.display = view==='history'?'block':'none';
  document.getElementById('navLog').classList.toggle('active', view==='log');
  document.getElementById('navHistory').classList.toggle('active', view==='history');
  if (view==='history') loadAndRenderHistory();
}

function renderDaySelector() {
  const today = new Date().getDay();
  document.getElementById('daySelector').innerHTML = DAYS.map((d,i) => `
    <button class="day-btn ${i===currentDay?'active':''} ${i===today?'is-today':''}" onclick="selectDay(${i})">${d.short}</button>
  `).join('');
}

async function selectDay(i) {
  currentDay = i;
  renderDaySelector();
  await loadAndRenderSession();
}

// ── DRAFT helpers (includes dailyData) ──
function loadDraft() {
  const raw = localStorage.getItem(`draft_${currentUser.id}_${currentDay}`);
  if (raw) {
    const parsed = JSON.parse(raw);
    sessionData = parsed.session || {};
    dailyData   = parsed.daily  || { steps: false, cardio: { type:'', duration:'', done:false } };
  } else {
    sessionData = {};
    dailyData   = { steps: false, cardio: { type:'', duration:'', done:false } };
  }
}

function saveDraft() {
  localStorage.setItem(`draft_${currentUser.id}_${currentDay}`, JSON.stringify({ session: sessionData, daily: dailyData }));
}

async function loadAndRenderSession() {
  const day = DAYS[currentDay];
  const area = document.getElementById('sessionArea');
  loadDraft();

  if (day.rest) {
    area.innerHTML = `
      <div class="rest-card">
        <div class="rest-card-icon">🔋</div>
        <div class="rest-card-title">Rest Day</div>
      </div>
      ${buildDailyChecklist()}
      <div style="margin-top:14px">
        <button class="save-btn" id="saveBtn" onclick="commitSession()" style="width:100%;justify-content:center">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Save Day
        </button>
      </div>`;
    attachChecklistListeners();
    return;
  }

  area.innerHTML = `<div style="text-align:center;padding:40px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text3)">LOADING...</div>`;
  const {data: last} = await sb.from('sessions').select('*').eq('user_id', currentUser.id).eq('day_index', currentDay).order('created_at', {ascending:false}).limit(1);
  renderSession(last && last.length ? last[0] : null);
}

function renderSession(lastSession) {
  const day = DAYS[currentDay];
  const done = day.exercises.filter(ex => sessionData[ex.name]?.sets?.some(s=>s.done)).length;
  document.getElementById('sessionArea').innerHTML = `
    <div class="session-header">
      <div>
        <div class="session-title">${day.name}</div>
        <div class="session-focus" id="progressLabel">${day.focus} · ${done}/${day.exercises.length} done</div>
      </div>
      <button class="save-btn" id="saveBtn" onclick="commitSession()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
    </div>
    ${day.exercises.map(ex => buildExCard(ex, lastSession)).join('')}
    ${buildDailyChecklist()}
  `;
  attachChecklistListeners();
}

// ── DAILY CHECKLIST HTML ──

  const c = dailyData.cardio || { type:'', duration:'', done:false };
  const stepsChecked = dailyData.steps ? 'checked' : '';
  const cardioChecked = c.done ? 'checked' : '';

  return `
    <div class="daily-checklist" id="dailyChecklist">
      <div class="checklist-header">
        <span class="checklist-title">// Daily Goals</span>
      </div>
      <div class="checklist-body">

        <!-- STEPS -->
        <div class="check-row ${dailyData.steps?'checked':''}" id="stepsRow">
          <div class="check-row-left">
            <div class="check-row-icon-label">
              <span class="check-row-icon">🚶</span>
              <span class="check-row-label">10,000 Steps</span>
            </div>
            <div class="check-row-sub ${dailyData.steps?'done-sub':''}" id="stepsSub">
              ${dailyData.steps ? '✓ Closed' : 'Tap to mark done'}
            </div>
          </div>
          <button class="big-check ${dailyData.steps?'done':''}" id="stepsBtn" ontouchend="toggleSteps(event)" onclick="toggleSteps(event)">
            ${dailyData.steps?'✓':'○'}
          </button>
        </div>

        <!-- CARDIO -->
        <div class="cardio-block ${c.done?'checked':''}" id="cardioBlock">
          <div class="cardio-top">
            <div class="cardio-label-row">
              <span class="cardio-icon">⚡</span>
              <span class="cardio-label">Cardio</span>
            </div>
            <button class="big-check ${c.done?'done':''}" id="cardioBtn" ontouchend="toggleCardio(event)" onclick="toggleCardio(event)">

            </button>

          <div class="cardio-type-row">
            <button class="cardio-type-btn ${c.type==='Elliptical'?'selected':''}" id="btnElliptical"
              ontouchend="setCardioType(event,'Elliptical')" onclick="setCardioType(event,'Elliptical')">
              Elliptical
            </button>
            <button class="cardio-type-btn ${c.type==='Stairs'?'selected':''}" id="btnStairs"

              Stairs

          <div class="cardio-duration-row">
            <input class="duration-input ${c.duration?'filled':''}" id="durationInput"

function attachChecklistListeners() {
  // nothing extra needed — handlers are inline
}

// ── CHECKLIST ACTIONS ──
function toggleSteps(e) {
  e.preventDefault();
  e.stopPropagation();
  dailyData.steps = !dailyData.steps;
  saveDraft();
  const btn = document.getElementById('stepsBtn');
  const row = document.getElementById('stepsRow');
  const sub = document.getElementById('stepsSub');
  if (btn) { btn.classList.toggle('done', dailyData.steps); btn.textContent = dailyData.steps ? '✓' : '○'; }
  if (row) row.classList.toggle('checked', dailyData.steps);
  if (sub) { sub.textContent = dailyData.steps ? '✓ Closed' : 'Tap to mark done'; sub.classList.toggle('done-sub', dailyData.steps); }
}

function setCardioType(e, type) {
  e.preventDefault();
  e.stopPropagation();
  dailyData.cardio = dailyData.cardio || {};
  dailyData.cardio.type = dailyData.cardio.type === type ? '' : type;
  saveDraft();
  document.getElementById('btnElliptical').classList.toggle('selected', dailyData.cardio.type === 'Elliptical');
  document.getElementById('btnStairs').classList.toggle('selected', dailyData.cardio.type === 'Stairs');
}

function setCardioDuration(val) {
  dailyData.cardio = dailyData.cardio || {};
  dailyData.cardio.duration = val;
  const el = document.getElementById('durationInput');
  if (el) el.classList.toggle('filled', !!val);
  saveDraft();
}

function toggleCardio(e) {
  e.preventDefault();
  e.stopPropagation();
  dailyData.cardio = dailyData.cardio || {};
  dailyData.cardio.done = !dailyData.cardio.done;
  saveDraft();
  const btn = document.getElementById('cardioBtn');
  const block = document.getElementById('cardioBlock');
  if (btn) { btn.classList.toggle('done', dailyData.cardio.done); btn.textContent = dailyData.cardio.done ? '✓' : '○'; }
  if (block) block.classList.toggle('checked', dailyData.cardio.done);
}

// ── EXERCISE CARD ──
function buildExCard(ex, lastSession) {
  const key = ex.name;
  const sid = safeId(key);
  const data = sessionData[key] || { sets: Array(ex.sets).fill(null).map(()=>({weight:'',reps:'',done:false})), notes:'' };

  const lastEx = lastSession?.exercises_ordered?.find(e => e.name === key);
  const lastRefHTML = lastEx ? `
    <div class="last-ref">
      <span class="last-ref-label">Last:</span>
      ${lastEx.sets.filter(s=>s.done).map((s,i)=>`<span class="lset">S${i+1} ${s.weight||'?'}kg×${s.reps||'?'}</span>`).join('')}
    </div>` : '';

  const rows = data.sets.map((s,i) => `
    <div class="set-row" id="sr_${sid}_${i}">
      <div class="set-num">${i+1}</div>
      <input class="set-input ${s.weight?'filled':''}" type="number" inputmode="decimal" placeholder="kg"
        value="${s.weight||''}" min="0" max="500" step="0.5"
        oninput="upSet('${sid}','${key}',${i},'weight',this.value)" id="w_${sid}_${i}">
      <input class="set-input ${s.reps?'filled':''}" type="number" inputmode="numeric" placeholder="reps"
        value="${s.reps||''}" min="0" max="99"
        oninput="upSet('${sid}','${key}',${i},'reps',this.value)" id="r_${sid}_${i}">
      <button class="set-check ${s.done?'done':''}" id="chk_${sid}_${i}"
        ontouchend="touchDone(event,'${sid}','${key}',${i})"
        onclick="touchDone(event,'${sid}','${key}',${i})">${s.done?'✓':'○'}</button>
    </div>`).join('');

  const isLogged = data.sets.some(s=>s.done);
  return `
    <div class="ex-card ${isLogged?'logged':''} open" id="exc_${sid}">
      <div class="ex-card-header" onclick="toggleCard('${sid}')">
        <div>
          <div class="ex-title"><span class="ex-done-dot"></span>${ex.name}</div>
          <div class="ex-muscles-row">${ex.muscles.map(([c,l])=>`<span class="mt ${c}">${l}</span>`).join('')}</div>
        </div>
        <div class="ex-header-right">
          <div><div class="ex-sets-badge">${ex.sets}×${ex.reps}</div><div class="ex-kind-label">${ex.kind}</div></div>
          <div class="chevron">▼</div>
        </div>
      </div>
      ${lastRefHTML}
      <div class="log-body">
        <div class="set-labels"><div></div><div class="input-label">kg</div><div class="input-label">reps</div><div></div></div>
        <div class="sets-grid">${rows}</div>
        <div class="notes-row"><textarea class="notes-input" rows="2" placeholder="Notes..." oninput="upNotes('${key}',this.value)">${data.notes||''}</textarea></div>
      </div>
    </div>`;
}

function toggleCard(sid) { document.getElementById('exc_'+sid).classList.toggle('open'); }

function upSet(sid, key, idx, field, val) {
  if (!sessionData[key]) initEx(key);
  if (field==='reps' && val!=='' && parseInt(val)>99) {
    val='99';
    const el = document.getElementById('r_'+sid+'_'+idx);
    if (el) el.value='99';
  }
  sessionData[key].sets[idx][field] = val;
  const el = document.getElementById((field==='weight'?'w_':'r_')+sid+'_'+idx);
  if (el) el.classList.toggle('filled', !!val);
  saveDraft();
}

function upNotes(key, val) {
  if (!sessionData[key]) initEx(key);
  sessionData[key].notes = val;
  saveDraft();
}

function touchDone(e, sid, key, idx) {
  e.preventDefault();
  e.stopPropagation();
  if (!sessionData[key]) initEx(key);
  const s = sessionData[key].sets[idx];
  s.done = !s.done;
  saveDraft();
  const btn = document.getElementById('chk_'+sid+'_'+idx);
  if (btn) { btn.classList.toggle('done', s.done); btn.textContent = s.done ? '✓' : '○'; }
  const card = document.getElementById('exc_'+sid);
  if (card) card.classList.toggle('logged', sessionData[key].sets.some(x=>x.done));
  updateProgress();
}

function updateProgress() {
  const day = DAYS[currentDay];
  const n = day.exercises.filter(ex => sessionData[ex.name]?.sets?.some(s=>s.done)).length;
  const el = document.getElementById('progressLabel');
  if (el) el.textContent = `${day.focus} · ${n}/${day.exercises.length} done`;
}

function initEx(key) {
  const ex = DAYS[currentDay].exercises.find(e=>e.name===key);
  if (!ex) return;
  sessionData[key] = { sets: Array(ex.sets).fill(null).map(()=>({weight:'',reps:'',done:false})), notes:'' };
}

// ── SAVE SESSION ──
async function commitSession() {
  const btn = document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='Saving...';
  const day = DAYS[currentDay];

  const exercisesOrdered = day.rest ? [] : day.exercises.map(ex => ({
    name: ex.name,
    sets: sessionData[ex.name]?.sets || Array(ex.sets).fill(null).map(()=>({weight:'',reps:'',done:false})),
    notes: sessionData[ex.name]?.notes || ''
  }));

  const {error} = await sb.from('sessions').insert({
    user_id: currentUser.id,
    day_index: currentDay,
    day_name: day.name,
    exercises_ordered: exercisesOrdered,
    daily: dailyData,
    created_at: new Date().toISOString()
  });

  btn.disabled=false; btn.textContent = day.rest ? 'Save Day' : 'Save';
  if (error) { showToast('ERROR: '+error.message, true); return; }

  localStorage.removeItem(`draft_${currentUser.id}_${currentDay}`);
  sessionData = {};
  dailyData = { steps:false, cardio:{ type:'', duration:'', done:false } };
  await loadAndRenderSession();
  showToast('SESSION SAVED ✓');
}

// ── HISTORY ──
async function loadAndRenderHistory() {
  document.getElementById('historyArea').innerHTML = `<div class="history-empty">LOADING...</div>`;
  const {data, error} = await sb.from('sessions').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false}).limit(60);
  if (error||!data||!data.length) {
    document.getElementById('historyArea').innerHTML = `<div class="history-empty">// NO SESSIONS LOGGED YET</div>`;
    return;
  }

  document.getElementById('historyArea').innerHTML = data.map(s => {
    const exList = s.exercises_ordered || [];
    const daily = s.daily || {};
    const totalDone = exList.reduce((a,ex)=>a+(ex.sets||[]).filter(x=>x.done).length, 0);
    const dateStr = new Date(s.created_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    const timeStr = new Date(s.created_at).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

    const exHTML = exList.map(ex => {
      const sHTML = (ex.sets||[]).map((set,i)=>`<span class="hist-set ${set.done?'done':''}">S${i+1} ${set.weight||'—'}kg×${set.reps||'—'}</span>`).join('');
      const nHTML = ex.notes ? `<div class="hist-notes">"${ex.notes}"</div>` : '';
      return `<div class="hist-ex"><div class="hist-ex-name">${ex.name}</div><div class="hist-sets">${sHTML}</div>${nHTML}</div>`;
    }).join('');

    // Daily summary in history
    const c = daily.cardio || {};
    const stepsHTML = `<span class="hist-daily-item ${daily.steps?'done':'not-done'}">${daily.steps?'✓':'✗'} 10k Steps</span>`;
    const cardioText = [c.type, c.duration].filter(Boolean).join(' · ') || 'Cardio';
    const cardioHTML = `<span class="hist-daily-item ${c.done?'blue-done':'not-done'}">${c.done?'✓':'✗'} ${cardioText}</span>`;

    const badges = exList.length
      ? `<span class="hist-badge">${exList.length} exs</span><span class="hist-badge">${totalDone} sets ✓</span>`
      : `<span class="hist-badge">Rest Day</span>`;

    return `
      <div class="history-session" id="hs_${s.id}">
        <div class="history-session-header" onclick="toggleHist('hs_${s.id}')">
          <div><div class="hist-day-name">${s.day_name}</div><div class="hist-date">${dateStr} · ${timeStr}</div></div>
          <div class="hist-badges">${badges}</div>
          <button class="hist-delete" onclick="delSession(event,'${s.id}')">✕</button>
          <span class="hchevron">▼</span>
        </div>
        <div class="history-session-body">
          ${exHTML}
          <div class="hist-daily">${stepsHTML}${cardioHTML}</div>
        </div>
      </div>`;
  }).join('');
}

function toggleHist(id) { document.getElementById(id).classList.toggle('open'); }

async function delSession(e, id) {
  e.stopPropagation();
  if (!confirm('Delete this session?')) return;
  await sb.from('sessions').delete().eq('id', id);
  loadAndRenderHistory();
  showToast('DELETED');
}

function show(id) { document.getElementById(id).style.display='block'; }
function hide(id) { document.getElementById(id).style.display='none'; }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast'+(isError?' error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
